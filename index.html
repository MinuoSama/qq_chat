<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>無言和柳烟的聊天记录</title>
    
    <!-- QQ/微信合并分享聊天记录卡片预览效果 -->
    <meta property="og:title" content="無言和柳烟的聊天记录">
    <meta property="og:description" content="無言: 就是两个应用&#10;無言: 在发了&#10;尹小胖: 不用发了&#10;無言: https://fbapi2.fbsublink.com/flydsubl/tm5mgfi7vgwovdt3?clash=1&extend=1&#10;無言: 扫这个">
    <meta property="og:image" content="https://i.imgur.com/7Qm5j8r.png">
    <meta property="og:url" content="https://your-domain.com/qq-chat.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #e5e5e5;
            min-height: 100vh;
        }
        
        .chat-container {
            max-width: 450px;
            margin: 0 auto;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            background: #f8f8f8;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .back-btn:hover {
            background: #e8e8e8;
        }
        
        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .header-right {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .header-right:hover {
            background: #e8e8e8;
        }
        
        .chat-messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }
        
        .message-group {
            margin-bottom: 20px;
        }
        
        .message-date {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
        }
        
        .message-date span {
            background: #e5e5e5;
            padding: 4px 12px;
            border-radius: 10px;
        }
        
        .message {
            display: flex;
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease-out;
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            margin-right: 8px;
        }
        
        .message-content {
            max-width: 75%;
        }
        
        .message-sender {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
            margin-left: 4px;
        }
        
        .message-bubble {
            background: #fff;
            padding: 10px 14px;
            border-radius: 2px 10px 10px 10px;
            font-size: 15px;
            line-height: 1.5;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .message-bubble.link {
            background: #fff6ed;
        }
        
        .message-bubble.link a {
            color: #1287ff;
            word-break: break-all;
        }
        
        .message.sent .message-bubble {
            background: #1287ff;
            color: white;
            border-radius: 10px 2px 10px 10px;
        }
        
        .message.sent {
            flex-direction: row-reverse;
        }
        
        .message.sent .message-avatar {
            margin-right: 0;
            margin-left: 8px;
        }
        
        .message.sent .message-sender {
            text-align: right;
            margin-left: 0;
            margin-right: 4px;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .chat-footer {
            padding: 10px 12px;
            background: #f8f8f8;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .footer-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .footer-btn.primary {
            background: #1287ff;
            color: white;
        }
        
        .footer-btn.primary:hover {
            background: #0d77e5;
        }
        
        .footer-btn.secondary {
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
        }
        
        .footer-btn.secondary:hover {
            background: #f5f5f5;
        }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        
        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        
        @media (max-width: 450px) {
            .chat-container {
                max-width: 100%;
            }
            
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-messages">
            <div class="message-group">
                <div class="message-date"><span>2025/07/31 晚上7:26</span></div>
                
                <div class="message">
                    <div class="message-avatar" style="background: linear-gradient(135deg, #ff6b6b, #feca57); color: white;">無</div>
                    <div class="message-content">
                        <div class="message-sender">無言</div>
                        <div class="message-bubble">就是两个应用</div>
                    </div>
                </div>
                
                <div class="message">
                    <div class="message-avatar" style="background: linear-gradient(135deg, #ff6b6b, #feca57); color: white;">無</div>
                    <div class="message-content">
                        <div class="message-sender">無言</div>
                        <div class="message-bubble">在发了</div>
                    </div>
                </div>
                
                <div class="message">
                    <div class="message-avatar" style="background: linear-gradient(135deg, #54a0ff, #5f27cd); color: white;">尹</div>
                    <div class="message-content">
                        <div class="message-sender">尹小胖</div>
                        <div class="message-bubble">不用发了</div>
                    </div>
                </div>
            </div>
            
            <div class="message-group">
                <div class="message-date"><span>2025/11/15 凌晨0:20</span></div>
                
                <div class="message">
                    <div class="message-avatar" style="background: linear-gradient(135deg, #ff6b6b, #feca57); color: white;">無</div>
                    <div class="message-content">
                        <div class="message-sender">無言</div>
                        <div class="message-bubble link">
                            <a href="https://fbapi2.fbsublink.com/flydsubl/tm5mgfi7vgwovdt3?clash=1&extend=1" target="_blank">
                                https://fbapi2.fbsublink.com/flydsubl/tm5mgfi7vgwovdt3?clash=1&extend=1
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="message-group">
                <div class="message-date"><span>03/17 下午4:28</span></div>
                
                <div class="message">
                    <div class="message-avatar" style="background: linear-gradient(135deg, #ff6b6b, #feca57); color: white;">無</div>
                    <div class="message-content">
                        <div class="message-sender">無言</div>
                        <div class="message-bubble">扫这个</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }
        
        function copyLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                showToast('链接已复制📋');
            }).catch(() => {
                showToast('复制失败');
            });
        }
    </script>
</body>
</html>
